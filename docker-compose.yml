services:
  postgres:
    image: postgres:16
    container_name: cortex-memory-postgres
    environment:
      POSTGRES_DB: cortex_memory
      POSTGRES_USER: cortex_memory
      POSTGRES_PASSWORD: cortex_memory
    ports:
      - "55432:5432"
    volumes:
      - cortex_memory_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortex_memory -d cortex_memory"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cortex_memory_postgres:
