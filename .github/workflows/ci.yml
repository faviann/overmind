name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: overmind
          POSTGRES_PASSWORD: overmind_dev
          POSTGRES_DB: postgres
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U overmind -d postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Verify invalid external configuration fails during preflight
        run: |
          if MEMSRV_TEST_ADMIN_CONNECTION_STRING=invalid tools/test-db.sh preflight 2>preflight.err; then
            exit 1
          fi
          grep -F 'must be a PostgreSQL connection URL' preflight.err
      - name: Verify unreachable external configuration fails during preflight
        run: |
          if MEMSRV_TEST_ADMIN_CONNECTION_STRING=postgres://overmind:overmind_dev@127.0.0.1:1/postgres \
              tools/test-db.sh preflight 2>preflight.err; then
            exit 1
          fi
          grep -F 'cannot connect to the external PostgreSQL test instance' preflight.err
      - name: Verify insufficient external authority fails during preflight
        run: |
          PGPASSWORD=overmind_dev psql -h 127.0.0.1 -p 55432 -U overmind -d postgres \
            -c "CREATE ROLE preflight_limited LOGIN PASSWORD 'preflight_dev'"
          if MEMSRV_TEST_ADMIN_CONNECTION_STRING=postgres://preflight_limited:preflight_dev@127.0.0.1:55432/postgres \
              tools/test-db.sh preflight 2>preflight.err; then
            exit 1
          fi
          grep -F 'must be a PostgreSQL superuser' preflight.err
          PGPASSWORD=overmind_dev psql -h 127.0.0.1 -p 55432 -U overmind -d postgres \
            -c "DROP ROLE preflight_limited"
      - name: Run canonical suite against externally provisioned PostgreSQL
        env:
          DOCKER_HOST: unix:///does-not-exist
          MEMSRV_TEST_ADMIN_CONNECTION_STRING: postgres://overmind:overmind_dev@127.0.0.1:55432/postgres
        run: make test

  test-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Run canonical suite with default Compose provisioning
        run: make test

  reference-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build reference deployment candidate
        run: docker build -t ghcr.io/faviann/overmind:compose-ci .
      - name: Verify reference Compose lifecycle
        run: make smoke-compose IMAGE=ghcr.io/faviann/overmind:compose-ci

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, test-compose, reference-compose]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build release image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          VERSION=${GITHUB_REF_NAME#v}
          docker build -t "$IMAGE:$VERSION" .
      - name: Verify release candidate image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          VERSION=${GITHUB_REF_NAME#v}
          tools/smoke-release-image.sh "$IMAGE:$VERSION"
      - name: Push immutable release tag
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          VERSION=${GITHUB_REF_NAME#v}
          docker push "$IMAGE:$VERSION"
      - name: Verify published release image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          VERSION=${GITHUB_REF_NAME#v}
          tools/smoke-release-image.sh --pull "$IMAGE:$VERSION"
