name: overmind

services:
  postgres:
    image: postgres:18
    entrypoint:
      - /bin/bash
      - -ec
      - |
        cat > /docker-entrypoint-initdb.d/01-roles-and-databases.sql <<'SQL'
        CREATE ROLE memsrv LOGIN PASSWORD 'memsrv_dev';
        CREATE DATABASE memory_dev;
        CREATE DATABASE memory_test;
        SQL
        exec /usr/local/bin/docker-entrypoint.sh postgres
    environment:
      POSTGRES_USER: overmind
      POSTGRES_PASSWORD: overmind_dev
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overmind -d postgres"]
      interval: 2s
      timeout: 3s
      retries: 30

  # One-shot migration runner against memory_dev; mirrors how production
  # invokes migrations (one-shot container, admin URL via env, never on disk).
  migrate:
    build: .
    profiles: ["tools"]
    entrypoint: ["memctl"]
    command: ["migrate"]
    environment:
      MEMSRV_ADMIN_CONNECTION_STRING: postgres://overmind:overmind_dev@postgres:5432/memory_dev
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
