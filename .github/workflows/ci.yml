name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: overmind
          POSTGRES_PASSWORD: overmind_dev
          POSTGRES_DB: postgres
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U overmind -d postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
      postgres17:
        image: postgres:17
        env:
          POSTGRES_USER: overmind
          POSTGRES_PASSWORD: overmind_dev
          POSTGRES_DB: postgres
        ports:
          - 55433:5432
        options: >-
          --health-cmd "pg_isready -U overmind -d postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Verify external preflight failures and provision role
        run: |
          expect_preflight_failure() {
            local connection=$1 expected=$2
            if MEMSRV_TEST_ADMIN_CONNECTION_STRING="$connection" \
                tools/test-db.sh preflight 2>preflight.err; then
              printf 'expected external database preflight to fail: %s\n' "$expected" >&2
              exit 1
            fi
            grep -F "$expected" preflight.err
          }

          readonly admin_url=postgres://overmind:overmind_dev@127.0.0.1:55432/postgres
          expect_preflight_failure invalid 'must be a PostgreSQL connection URL'
          expect_preflight_failure \
            postgres://overmind:overmind_dev@127.0.0.1:1/postgres \
            'cannot connect to the external PostgreSQL test instance'

          expect_preflight_failure \
            postgres://overmind:overmind_dev@127.0.0.1:55433/postgres \
            'external test database must be PostgreSQL 18'

          PGPASSWORD=overmind_dev psql -h 127.0.0.1 -p 55432 -U overmind -d postgres \
            -c "CREATE ROLE preflight_limited LOGIN PASSWORD 'preflight_dev'"
          expect_preflight_failure \
            postgres://preflight_limited:preflight_dev@127.0.0.1:55432/postgres \
            'must be a PostgreSQL superuser'
          PGPASSWORD=overmind_dev psql -h 127.0.0.1 -p 55432 -U overmind -d postgres \
            -c "DROP ROLE preflight_limited"

          expect_preflight_failure "$admin_url" 'is missing the required memsrv role'
          PGPASSWORD=overmind_dev psql -h 127.0.0.1 -p 55432 -U overmind -d postgres \
            -c "CREATE ROLE memsrv LOGIN PASSWORD 'memsrv_dev'"
          PGPASSWORD=overmind_dev psql -h 127.0.0.1 -p 55432 -U overmind -d postgres \
            -c "ALTER ROLE memsrv CREATEDB"
          expect_preflight_failure "$admin_url" 'memsrv role has incompatible attributes'
          PGPASSWORD=overmind_dev psql -h 127.0.0.1 -p 55432 -U overmind -d postgres \
            -c "ALTER ROLE memsrv NOCREATEDB"
      - name: Run canonical suite against externally provisioned PostgreSQL
        env:
          DOCKER_HOST: unix:///does-not-exist
          MEMSRV_TEST_ADMIN_CONNECTION_STRING: postgres://overmind:overmind_dev@127.0.0.1:55432/postgres
        run: make test

  test-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Run canonical suite with default Compose provisioning
        run: make test

  reference-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build reference deployment candidate
        run: docker build -t ghcr.io/faviann/overmind:compose-ci .
      - name: Verify reference Compose lifecycle
        run: make smoke-compose IMAGE=ghcr.io/faviann/overmind:compose-ci

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, test-compose, reference-compose]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build release image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          VERSION=${GITHUB_REF_NAME#v}
          docker build -t "$IMAGE:$VERSION" .
      - name: Verify release candidate image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          VERSION=${GITHUB_REF_NAME#v}
          tools/smoke-release-image.sh "$IMAGE:$VERSION"
      - name: Push immutable release tag
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          VERSION=${GITHUB_REF_NAME#v}
          docker push "$IMAGE:$VERSION"
      - name: Verify published release image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          VERSION=${GITHUB_REF_NAME#v}
          tools/smoke-release-image.sh --pull "$IMAGE:$VERSION"
